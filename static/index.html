<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Jarvis</title>
    <link rel="manifest" href="/static/manifest.json" />
    <meta name="theme-color" content="#000a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Jarvis" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        :root {
            --gold: #c8a84b;
            --gold-dim: #7a6228;
            --cyan: #00d4ff;
            --cyan-dim: #004d5e;
            --red: #ff3131;
            --bg: #000a0f;
            --panel: rgba(0, 20, 30, 0.85);
            --glow-cyan: 0 0 12px rgba(0, 212, 255, 0.7), 0 0 40px rgba(0, 212, 255, 0.25);
            --glow-gold: 0 0 12px rgba(200, 168, 75, 0.7), 0 0 40px rgba(200, 168, 75, 0.2);
            --font-hud: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-title: 'Orbitron', sans-serif;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg)
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 212, 255, 0.018) 2px, rgba(0, 212, 255, 0.018) 4px);
            pointer-events: none;
            z-index: 999;
            animation: scanMove 8s linear infinite
        }

        @keyframes scanMove {
            0% {
                background-position: 0 0
            }

            100% {
                background-position: 0 200px
            }
        }

        .hex-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.18
        }

        .app {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            z-index: 1;
            font-family: var(--font-hud)
        }

        .hud-top {
            padding: max(14px, env(safe-area-inset-top)) 16px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative
        }

        .hud-top::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.5
        }

        .brand-title {
            font-family: var(--font-title);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--cyan);
            text-shadow: var(--glow-cyan)
        }

        .brand-sub {
            font-size: 11px;
            letter-spacing: 0.25em;
            color: var(--gold);
            opacity: 0.8;
            margin-top: 2px;
            font-family: var(--font-mono)
        }

        .status-cluster {
            text-align: right
        }

        .status-live {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #00ff88;
            letter-spacing: 0.12em;
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: flex-end
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.9);
            animation: blink 2s infinite
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .sys-time {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--cyan);
            margin-top: 3px;
            letter-spacing: 0.08em
        }

        .hud-bar-left,
        .hud-bar-right {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, transparent 5%, var(--cyan-dim) 20%, var(--cyan) 50%, var(--cyan-dim) 80%, transparent 95%);
            z-index: 2;
            opacity: 0.6
        }

        .hud-bar-left {
            left: 0
        }

        .hud-bar-right {
            right: 0
        }

        .hud-bar-left::after,
        .hud-bar-right::after {
            content: '';
            position: absolute;
            top: 0;
            width: 12px;
            height: 100%;
            background: inherit;
            opacity: 0.15;
            filter: blur(6px)
        }

        .hud-bar-left::after {
            left: 0
        }

        .hud-bar-right::after {
            right: 0
        }

        .corner {
            position: fixed;
            width: 28px;
            height: 28px;
            z-index: 3;
            opacity: 0.7
        }

        .corner-tl {
            top: 6px;
            left: 6px;
            border-top: 2px solid var(--gold);
            border-left: 2px solid var(--gold)
        }

        .corner-tr {
            top: 6px;
            right: 6px;
            border-top: 2px solid var(--gold);
            border-right: 2px solid var(--gold)
        }

        .corner-bl {
            bottom: 6px;
            left: 6px;
            border-bottom: 2px solid var(--gold);
            border-left: 2px solid var(--gold)
        }

        .corner-br {
            bottom: 6px;
            right: 6px;
            border-bottom: 2px solid var(--gold);
            border-right: 2px solid var(--gold)
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            min-height: 0
        }

        .reactor-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px
        }

        .reactor-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid;
            animation: spin linear infinite
        }

        .ring-1 {
            width: 200px;
            height: 200px;
            border-color: rgba(0, 212, 255, 0.35);
            animation-duration: 18s
        }

        .ring-2 {
            width: 220px;
            height: 220px;
            border-color: rgba(200, 168, 75, 0.2);
            animation-duration: 28s;
            animation-direction: reverse
        }

        .ring-3 {
            width: 240px;
            height: 240px;
            border-color: rgba(0, 212, 255, 0.12);
            animation-duration: 40s
        }

        @keyframes spin {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg)
            }
        }

        .ring-ticks {
            position: absolute;
            width: 200px;
            height: 200px;
            animation: spin 18s linear infinite
        }

        .tick {
            position: absolute;
            width: 2px;
            height: 8px;
            background: var(--cyan);
            opacity: 0.7;
            left: 50%;
            transform-origin: 0 100px
        }

        .orb-btn {
            width: 148px;
            height: 148px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            position: relative;
            background: radial-gradient(circle at 38% 30%, #e8f9ff 0%, #7de8ff 8%, #00d4ff 28%, #005a7a 55%, #001a26 80%, #000a0f 100%);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.8), 0 0 80px rgba(0, 212, 255, 0.3), inset 0 0 30px rgba(0, 212, 255, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            outline: none
        }

        .orb-btn:active {
            transform: scale(0.96)
        }

        .orb-btn.recording {
            background: radial-gradient(circle at 38% 30%, #fff0f0 0%, #ff9a9a 12%, #ff3131 35%, #7f0000 65%, #1a0000 90%);
            box-shadow: 0 0 40px rgba(255, 49, 49, 0.9), 0 0 100px rgba(255, 49, 49, 0.3)
        }

        .orb-btn.thinking {
            animation: orbPulse 1.4s ease-in-out infinite
        }

        .orb-btn.speaking {
            animation: speakingPulse 0.9s ease-in-out infinite
        }

        @keyframes orbPulse {

            0%,
            100% {
                box-shadow: 0 0 40px rgba(0, 212, 255, 0.8), 0 0 80px rgba(0, 212, 255, 0.3)
            }

            50% {
                box-shadow: 0 0 60px rgba(0, 212, 255, 1), 0 0 130px rgba(0, 212, 255, 0.5)
            }
        }

        @keyframes speakingPulse {

            0%,
            100% {
                transform: scale(1);
                filter: brightness(1)
            }

            50% {
                transform: scale(1.04);
                filter: brightness(1.32)
            }
        }

        .orb-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: -1px;
            font-family: var(--font-title);
            font-weight: 900
        }

        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 212, 255, 0.4);
            animation: pulseOut 3s ease-out infinite
        }

        .pulse-ring:nth-child(1) {
            width: 148px;
            height: 148px;
            animation-delay: 0s
        }

        .pulse-ring:nth-child(2) {
            width: 148px;
            height: 148px;
            animation-delay: 1.5s
        }

        @keyframes pulseOut {
            0% {
                transform: scale(1);
                opacity: 0.6
            }

            100% {
                transform: scale(1.8);
                opacity: 0
            }
        }

        .status-line {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--cyan);
            letter-spacing: 0.08em;
            min-height: 20px;
            text-align: center;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.6)
        }

        .tap-hint {
            font-size: 11px;
            color: rgba(200, 168, 75, 0.6);
            letter-spacing: 0.2em;
            margin-top: 5px;
            text-align: center;
            font-family: var(--font-mono)
        }

        .response-panel {
            width: 100%;
            max-height: 38vh;
            overflow-y: auto;
            margin-top: 14px;
            background: rgba(0, 18, 28, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-radius: 4px;
            padding: 14px 16px;
            display: none;
            scrollbar-width: thin;
            scrollbar-color: var(--cyan-dim) transparent;
            position: relative
        }

        .response-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 4px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.04) 0%, transparent 60%);
            pointer-events: none
        }

        .response-panel.show {
            display: block
        }

        .resp-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15)
        }

        .resp-label {
            font-family: var(--font-title);
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--gold)
        }

        .resp-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-dim), transparent);
            opacity: 0.5
        }

        .resp-text {
            font-family: var(--font-hud);
            font-size: 14px;
            line-height: 1.6;
            color: #c8e8f0;
            white-space: pre-wrap
        }

        .task-grid {
            display: grid;
            gap: 8px
        }

        .task-item {
            border-left: 2px solid var(--cyan);
            padding: 8px 10px;
            background: rgba(0, 212, 255, 0.06);
            border-radius: 0 4px 4px 0
        }

        .task-item strong {
            color: var(--cyan);
            font-size: 13px;
            font-family: var(--font-mono)
        }

        .task-item p {
            font-size: 12px;
            color: #7baab8;
            margin-top: 3px
        }

        .chips-row {
            display: flex;
            gap: 8px;
            padding: 8px 14px;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0
        }

        .chips-row::-webkit-scrollbar {
            display: none
        }

        .chip {
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 20, 30, 0.7);
            color: var(--cyan);
            padding: 7px 13px;
            border-radius: 2px;
            font-size: 11px;
            white-space: nowrap;
            cursor: pointer;
            font-family: var(--font-mono);
            letter-spacing: 0.08em;
            transition: border-color 0.2s, background 0.2s;
            clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%)
        }

        .chip:active {
            background: rgba(0, 212, 255, 0.12);
            border-color: var(--cyan)
        }

        .footer {
            padding: 10px 12px max(12px, env(safe-area-inset-bottom));
            background: rgba(0, 6, 12, 0.92);
            border-top: 1px solid rgba(0, 212, 255, 0.18)
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(0, 16, 24, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.28);
            border-radius: 3px;
            padding: 6px;
            box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.04)
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-radius: 3px;
            background: rgba(0, 212, 255, 0.06);
            color: var(--cyan);
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-hud);
            transition: background 0.2s;
            outline: none
        }

        .icon-btn:active {
            background: rgba(0, 212, 255, 0.15)
        }

        .send-btn {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--cyan)
        }

        .send-btn:active {
            background: rgba(0, 212, 255, 0.35)
        }

        .msg-input {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            color: #d4eef5;
            font-size: 14px;
            font-family: var(--font-hud);
            padding: 10px 6px;
            letter-spacing: 0.04em
        }

        .msg-input::placeholder {
            color: rgba(0, 212, 255, 0.3);
            font-family: var(--font-mono);
            font-size: 12px
        }

        .footer-note {
            font-family: var(--font-mono);
            font-size: 10px;
            color: rgba(0, 212, 255, 0.4);
            padding: 5px 3px 0;
            letter-spacing: 0.06em;
            min-height: 16px
        }
    </style>
</head>

<body>
    <svg class="hex-bg" viewBox="0 0 400 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <defs>
            <pattern id="hex" x="0" y="0" width="46" height="52" patternUnits="userSpaceOnUse">
                <polygon points="23,2 44,13 44,39 23,50 2,39 2,13" fill="none" stroke="rgba(0,212,255,0.4)"
                    stroke-width="0.6" />
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#hex)" />
        <radialGradient id="fadeOut" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="white" stop-opacity="0" />
            <stop offset="100%" stop-color="black" stop-opacity="0.9" />
        </radialGradient>
        <rect width="100%" height="100%" fill="url(#fadeOut)" />
    </svg>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="hud-bar-left"></div>
    <div class="hud-bar-right"></div>

    <main class="app">
        <header class="hud-top">
            <div class="brand-block">
                <div class="brand-title">JARVIS</div>
                <div class="brand-sub">PERSONAL AI SYSTEM | ONLINE</div>
            </div>
            <div class="status-cluster">
                <div class="status-live"><span class="live-dot"></span>SYS LIVE</div>
                <div class="sys-time" id="sysTime">00:00:00</div>
            </div>
        </header>

        <section class="main">
            <div class="reactor-wrap">
                <div class="reactor-ring ring-3"></div>
                <div class="reactor-ring ring-2"></div>
                <div class="reactor-ring ring-1" id="ring1">
                    <div class="ring-ticks" id="ringTicks"></div>
                </div>

                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>

                <button id="orbBtn" class="orb-btn" onclick="toggleVoice()" title="Speak to Jarvis">
                    <div class="orb-inner" id="orbIcon">J</div>
                </button>
            </div>

            <div id="statusText" class="status-line">AWAITING COMMAND</div>
            <div class="tap-hint">[ TAP ORB TO SPEAK | TAP WHILE SPEAKING TO INTERRUPT ]</div>

            <section id="responsePanel" class="response-panel">
                <div class="resp-header">
                    <span id="responseTitle" class="resp-label">JARVIS</span>
                    <div class="resp-line"></div>
                </div>
                <div id="responseContent" class="resp-text"></div>
            </section>
        </section>

        <div class="chips-row">
            <button class="chip" onclick="quickSend('what do you remember about me?')">MEM</button>
            <button class="chip" onclick="quickFill('search online for ')">SCAN</button>
            <button class="chip" onclick="quickFill('debug this error: ')">DEBUG</button>
            <button class="chip" onclick="quickFill('analyze this file and ')">ANALYZE</button>
            <button class="chip" onclick="quickSend('list tasks')">TASKS</button>
            <button class="chip" onclick="quickSend('what should I focus on today?')">PRIORITY</button>
        </div>

        <footer class="footer">
            <div class="input-row">
                <button class="icon-btn" id="fileBtn" onclick="openFilePicker()" title="Upload">UP</button>
                <input id="fileInput" type="file" hidden
                    accept=".txt,.md,.py,.js,.html,.css,.json,.csv,.xml,.yaml,.yml,.java,.cpp,.c,.ts,.tsx,.jsx,.vue,.go,.rs,.php,.rb,.cs,.pdf" />
                <input class="msg-input" id="messageInput" placeholder="[ INPUT COMMAND... ]" autocomplete="off" />
                <button class="icon-btn send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&gt;</button>
            </div>
            <div id="footerNote" class="footer-note"></div>
        </footer>
    </main>

    <script>
        const orbBtn = document.getElementById("orbBtn");
        const orbIcon = document.getElementById("orbIcon");
        const statusText = document.getElementById("statusText");
        const responsePanel = document.getElementById("responsePanel");
        const responseTitle = document.getElementById("responseTitle");
        const responseContent = document.getElementById("responseContent");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const fileBtn = document.getElementById("fileBtn");
        const fileInput = document.getElementById("fileInput");
        const footerNote = document.getElementById("footerNote");

        let sessionId = localStorage.getItem("jarvis_session_id");
        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("jarvis_session_id", sessionId);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById("sysTime").textContent = now.toTimeString().slice(0, 8);
        }
        setInterval(updateClock, 1000);
        updateClock();

        (function buildTicks() {
            const wrap = document.getElementById("ringTicks");
            for (let i = 0; i < 24; i++) {
                const t = document.createElement("div");
                t.className = "tick";
                t.style.transform = `rotate(${i * 15}deg) translateX(-50%)`;
                t.style.opacity = i % 6 === 0 ? "1" : "0.35";
                t.style.height = i % 6 === 0 ? "12px" : "6px";
                wrap.appendChild(t);
            }
        })();

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingTimer = null;
        const MAX_MS = 10000;

        let voices = [];
        let jarvisVoice = null;
        let isSpeaking = false;

        function loadVoices() {
            if (!("speechSynthesis" in window)) return;

            voices = window.speechSynthesis.getVoices();
            if (!voices.length) return;

            // Pick the default English voice. This usually sounds more natural.
            jarvisVoice =
                voices.find(v => v.default && v.lang.toLowerCase().startsWith("en")) ||
                voices.find(v => v.lang.toLowerCase().startsWith("en")) ||
                voices[0];

            console.log("Selected Jarvis voice:", jarvisVoice.name, jarvisVoice.lang);
        }

        loadVoices();
        if ("speechSynthesis" in window) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        function getMimeType() {
            const types = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4", "audio/mpeg"];
            for (const t of types) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
            }
            return "";
        }

        function getAudioFilename(audioBlob) {
            const type = audioBlob.type || "";

            if (type.includes("mp4")) return "voice.mp4";
            if (type.includes("mpeg")) return "voice.mp3";
            if (type.includes("webm")) return "voice.webm";

            return "voice.webm";
        }

        function setStatus(text) {
            statusText.textContent = text;
            footerNote.textContent = text;
        }

        function setThinking(on) {
            sendBtn.disabled = on;
            fileBtn.disabled = on;

            if (on) {
                orbBtn.classList.add("thinking");
                setStatus("PROCESSING...");
            } else {
                orbBtn.classList.remove("thinking");
            }
        }

        function stopSpeech() {
            if ("speechSynthesis" in window) {
                window.speechSynthesis.cancel();
            }

            isSpeaking = false;
            orbBtn.classList.remove("speaking");
            setStatus("SPEECH INTERRUPTED");
        }

        function showResponse(text, title = "JARVIS") {
            responsePanel.classList.add("show");
            responseTitle.textContent = title === "You" ? "// INPUT" : "JARVIS";

            const tasks = parseTaskList(text);

            if (tasks.length > 0) {
                responseContent.className = "task-grid";
                responseContent.innerHTML = "";

                tasks.forEach(task => {
                    const item = document.createElement("div");
                    item.className = "task-item";

                    const strong = document.createElement("strong");
                    strong.textContent = `${task.id}. ${task.name}`;

                    item.appendChild(strong);

                    if (task.meta) {
                        const p = document.createElement("p");
                        p.textContent = task.meta;
                        item.appendChild(p);
                    }

                    responseContent.appendChild(item);
                });

                return;
            }

            responseContent.className = "resp-text";
            responseContent.textContent = text;
        }

        function parseTaskList(text) {
            const lines = text.split("\n");
            const tasks = [];

            for (const line of lines) {
                const match = line.match(/^(\d+)\.\s+(.+?)(?:\s+-\s+(.+))?$/);

                if (match) {
                    tasks.push({
                        id: match[1],
                        name: match[2],
                        meta: match[3] || ""
                    });
                }
            }

            return tasks;
        }

        function quickFill(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        function quickSend(text) {
            messageInput.value = text;
            sendMessage();
        }

        function openFilePicker() {
            fileInput.click();
        }

        fileInput.addEventListener("change", async function () {
            const file = fileInput.files[0];
            if (!file) return;

            await uploadFile(file);
            fileInput.value = "";
        });

        async function uploadFile(file) {
            const instruction = messageInput.value.trim();

            showResponse(
                instruction ? `FILE: ${file.name}\nDIRECTIVE: ${instruction}` : `FILE: ${file.name}`,
                "You"
            );

            messageInput.value = "";
            setThinking(true);
            setStatus("ANALYZING FILE...");

            try {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("session_id", sessionId);
                formData.append("instruction", instruction);

                const response = await fetch("/upload-file", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                const reply = data.reply || "No analysis received.";

                showResponse(reply, "JARVIS");
                speak(reply);

            } catch (error) {
                showResponse("File analysis failed. Check backend.", "JARVIS");
            } finally {
                setThinking(false);
                setStatus("AWAITING COMMAND");
                messageInput.focus();
            }
        }

        async function toggleVoice() {
            if (isSpeaking || ("speechSynthesis" in window && window.speechSynthesis.speaking)) {
                stopSpeech();
                return;
            }

            if (isRecording) {
                stopRecording();
                return;
            }

            await startRecording();
        }

        async function startRecording() {
            if (!navigator.mediaDevices?.getUserMedia) {
                setStatus("MIC NOT SUPPORTED");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                audioChunks = [];

                const mimeType = getMimeType();

                mediaRecorder = mimeType
                    ? new MediaRecorder(stream, { mimeType })
                    : new MediaRecorder(stream);

                mediaRecorder.onstart = function () {
                    isRecording = true;
                    orbBtn.classList.add("recording");
                    orbIcon.textContent = "REC";
                    setStatus("LISTENING...");

                    recordingTimer = setTimeout(function () {
                        if (isRecording) {
                            stopRecording();
                        }
                    }, MAX_MS);
                };

                mediaRecorder.ondataavailable = function (event) {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async function () {
                    isRecording = false;
                    orbBtn.classList.remove("recording");
                    orbIcon.textContent = "J";
                    clearTimeout(recordingTimer);

                    stream.getTracks().forEach(track => track.stop());

                    const audioBlob = new Blob(audioChunks, {
                        type: mediaRecorder.mimeType || "audio/webm"
                    });

                    if (audioBlob.size < 1000) {
                        setStatus("AUDIO UNCLEAR - RETRY");
                        return;
                    }

                    await sendVoice(audioBlob);
                };

                playBeep();
                mediaRecorder.start();

            } catch (error) {
                setStatus("MIC ERROR: " + error.message);
                isRecording = false;
                orbBtn.classList.remove("recording");
                orbIcon.textContent = "J";
            }
        }

        function stopRecording() {
            try {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
            } catch (error) {
                console.log(error);
            }
        }

        async function sendVoice(audioBlob) {
            setThinking(true);
            setStatus("TRANSCRIBING...");

            try {
                const formData = new FormData();
                formData.append("audio", audioBlob, getAudioFilename(audioBlob));
                formData.append("session_id", sessionId);

                const response = await fetch("/voice-chat", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.transcript) {
                    showResponse(data.transcript, "You");
                }

                const reply = data.reply || "No response received.";

                showResponse(reply, "JARVIS");
                speak(reply);

            } catch (error) {
                showResponse("Voice processing failed.", "JARVIS");
            } finally {
                setThinking(false);
                setStatus("AWAITING COMMAND");
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message) return;

            showResponse(message, "You");
            messageInput.value = "";
            setThinking(true);

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showResponse(data.detail || "Server error.", "JARVIS");
                    return;
                }

                const reply = data.reply || "No response received.";

                showResponse(reply, "JARVIS");
                speak(reply);

            } catch (error) {
                showResponse("Cannot reach Jarvis backend.", "JARVIS");
            } finally {
                setThinking(false);
                setStatus("AWAITING COMMAND");
                messageInput.focus();
            }
        }

        function speak(text) {
            if (!("speechSynthesis" in window)) return;

            window.speechSynthesis.cancel();
            playBeep();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-US";

            // Natural voice settings
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;

            if (jarvisVoice) {
                utterance.voice = jarvisVoice;
                utterance.lang = jarvisVoice.lang;
            }

            utterance.onstart = function () {
                isSpeaking = true;
                orbBtn.classList.add("speaking");
                setStatus("SPEAKING...");
            };

            utterance.onend = function () {
                isSpeaking = false;
                orbBtn.classList.remove("speaking");
                setStatus("AWAITING COMMAND");
            };

            utterance.onerror = function () {
                isSpeaking = false;
                orbBtn.classList.remove("speaking");
                setStatus("AWAITING COMMAND");
            };

            window.speechSynthesis.speak(utterance);
        }
        function playBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();

                const oscillator = ctx.createOscillator();
                const gain = ctx.createGain();

                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(880, ctx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.12);

                gain.gain.setValueAtTime(0.06, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);

                oscillator.connect(gain);
                gain.connect(ctx.destination);

                oscillator.start();
                oscillator.stop(ctx.currentTime + 0.14);
            } catch (error) { }
        }

        messageInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/static/service-worker.js")
                    .then(function () {
                        console.log("Service worker registered.");
                    })
                    .catch(function (error) {
                        console.log("Service worker failed:", error);
                    });
            });
        }
    </script>
