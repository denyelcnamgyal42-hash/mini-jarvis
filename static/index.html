<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mini Jarvis</title>

    <link rel="manifest" href="/static/manifest.json" />
    <meta name="theme-color" content="#38bdf8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Jarvis" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />

    <style>
        * {
            box-sizing: border-box;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        :root {
            --bg-main: #020617;
            --bg-card: rgba(15, 23, 42, 0.94);
            --border-soft: rgba(148, 163, 184, 0.25);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --user-msg: linear-gradient(135deg, #2563eb, #1d4ed8);
            --jarvis-msg: #1e293b;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 35%),
                radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.18), transparent 35%),
                var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-shell {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            padding: 12px;
        }

        .app {
            width: 100%;
            height: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);
        }

        .header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--border-soft);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.72));
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .orb {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 30% 30%, #ffffff, #7dd3fc 22%, #0284c7 58%, #0f172a 100%);
            box-shadow: 0 0 26px rgba(56, 189, 248, 0.75);
            flex-shrink: 0;
        }

        .brand-text h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: -0.04em;
        }

        .brand-text p {
            margin: 3px 0 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .status-pill {
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(34, 197, 94, 0.12);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.25);
            font-size: 12px;
            white-space: nowrap;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-top: 14px;
            scrollbar-width: none;
        }

        .quick-actions::-webkit-scrollbar {
            display: none;
        }

        .chip {
            border: 1px solid var(--border-soft);
            background: rgba(30, 41, 59, 0.85);
            color: #dbeafe;
            padding: 9px 12px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .chip:active {
            transform: scale(0.98);
        }

        .dashboard {
            padding-top: 14px;
        }

        .greeting-card {
            border: 1px solid rgba(148, 163, 184, 0.22);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 35%),
                rgba(15, 23, 42, 0.8);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .greeting-card p {
            margin: 0 0 6px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .greeting-card h2 {
            margin: 0;
            font-size: 16px;
            line-height: 1.35;
            color: #e0f2fe;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(72px, 1fr));
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .stats-grid::-webkit-scrollbar {
            display: none;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.75);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            min-width: 72px;
        }

        .stat-card span {
            display: block;
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-card p {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        .stat-card.overdue span {
            color: var(--danger);
        }

        .stat-card.today span {
            color: var(--warning);
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 18px 14px;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            margin-bottom: 14px;
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        .message-row.jarvis-row {
            justify-content: flex-start;
        }

        .message {
            max-width: 82%;
            padding: 12px 14px;
            border-radius: 18px;
            line-height: 1.45;
            white-space: pre-wrap;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message.user {
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.25);
        }

        .message.jarvis {
            background: var(--jarvis-msg);
            color: #e5e7eb;
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-bottom-left-radius: 6px;
        }

        .timestamp {
            margin-top: 5px;
            font-size: 11px;
            color: rgba(226, 232, 240, 0.55);
        }

        .typing {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 0 16px 12px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            40% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        .input-area {
            padding: 12px;
            border-top: 1px solid var(--border-soft);
            background: rgba(2, 6, 23, 0.72);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-radius: 18px;
            padding: 8px;
        }

        input {
            flex: 1;
            min-width: 0;
            padding: 12px 10px;
            background: transparent;
            color: white;
            border: none;
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            border: none;
            cursor: pointer;
            font-weight: 700;
        }

        .icon-btn {
            width: 46px;
            height: 46px;
            border-radius: 15px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: 0.2s ease;
            font-size: 18px;
        }

        .mic-btn {
            background: rgba(30, 41, 59, 0.95);
            color: #e0f2fe;
            border: 1px solid rgba(148, 163, 184, 0.26);
        }

        .mic-btn.recording {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 22px rgba(239, 68, 68, 0.55);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.06);
            }

            100% {
                transform: scale(1);
            }
        }

        .send-btn {
            background: var(--accent);
            color: #020617;
        }

        .send-btn:hover {
            background: #7dd3fc;
        }

        .icon-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .voice-status {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 12px;
            min-height: 16px;
        }

        @media (max-width: 520px) {
            body {
                align-items: stretch;
            }

            .phone-shell {
                max-width: none;
                height: 100dvh;
                padding: 0;
            }

            .app {
                border-radius: 0;
                border: none;
            }

            .header {
                padding-top: 18px;
            }

            .message {
                max-width: 88%;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="phone-shell">
        <main class="app">
            <header class="header">
                <div class="top-row">
                    <div class="brand">
                        <div class="orb"></div>
                        <div class="brand-text">
                            <h1>Mini Jarvis</h1>
                            <p>Your personal AI agent</p>
                        </div>
                    </div>

                    <div class="status-pill">Online</div>
                </div>

                <div class="quick-actions">
                    <button class="chip" onclick="quickSend('list tasks')">List tasks</button>
                    <button class="chip" onclick="quickSend('show tasks due today')">Due today</button>
                    <button class="chip" onclick="quickSend('show overdue tasks')">Overdue</button>
                    <button class="chip" onclick="quickSend('what time is it?')">Time</button>
                    <button class="chip" onclick="quickSend('list notes')">Notes</button>
                    <button class="chip" onclick="quickFill('add task ')">Add task</button>
                    <button class="chip" onclick="quickSend('what should I focus on today?')">Focus</button>
                </div>

                <section class="dashboard">
                    <div class="greeting-card">
                        <p id="greetingText">Welcome back.</p>
                        <h2 id="focusText">Loading your focus...</h2>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <span id="pendingCount">0</span>
                            <p>Pending</p>
                        </div>

                        <div class="stat-card today">
                            <span id="dueTodayCount">0</span>
                            <p>Due Today</p>
                        </div>

                        <div class="stat-card overdue">
                            <span id="overdueCount">0</span>
                            <p>Overdue</p>
                        </div>

                        <div class="stat-card">
                            <span id="completedCount">0</span>
                            <p>Done</p>
                        </div>

                        <div class="stat-card">
                            <span id="notesCount">0</span>
                            <p>Notes</p>
                        </div>
                    </div>
                </section>
            </header>

            <section id="chatBox" class="chat-box">
                <div class="message-row jarvis-row">
                    <div>
                        <div class="message jarvis">
                            Hello. I am Mini Jarvis. You can add tasks with due dates, ask for today’s tasks, check
                            overdue work, or use voice.
                        </div>
                        <div class="timestamp">Jarvis</div>
                    </div>
                </div>
            </section>

            <div id="typingIndicator" class="typing">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                Jarvis is thinking...
            </div>

            <footer class="input-area">
                <div class="input-wrapper">
                    <button id="micBtn" class="icon-btn mic-btn" onclick="toggleVoice()">🎤</button>
                    <input id="messageInput" placeholder="Ask Jarvis anything..." autocomplete="off" />
                    <button id="sendBtn" class="icon-btn send-btn" onclick="sendMessage()">➤</button>
                </div>
                <div id="voiceStatus" class="voice-status"></div>
            </footer>
        </main>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const micBtn = document.getElementById("micBtn");
        const typingIndicator = document.getElementById("typingIndicator");
        const voiceStatus = document.getElementById("voiceStatus");

        const greetingText = document.getElementById("greetingText");
        const focusText = document.getElementById("focusText");
        const pendingCount = document.getElementById("pendingCount");
        const dueTodayCount = document.getElementById("dueTodayCount");
        const overdueCount = document.getElementById("overdueCount");
        const completedCount = document.getElementById("completedCount");
        const notesCount = document.getElementById("notesCount");

        let sessionId = localStorage.getItem("jarvis_session_id");

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("jarvis_session_id", sessionId);
        }

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        function getTime() {
            return new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function getGreeting() {
            const hour = new Date().getHours();

            if (hour < 12) {
                return "Good morning.";
            }

            if (hour < 18) {
                return "Good afternoon.";
            }

            return "Good evening.";
        }

        function formatDueDate(dueDate) {
            if (!dueDate) return "";

            const today = new Date();
            const target = new Date(dueDate + "T00:00:00");

            const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const targetOnly = new Date(target.getFullYear(), target.getMonth(), target.getDate());

            const diffTime = targetOnly - todayOnly;
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays === 0) return "Due today";
            if (diffDays === 1) return "Due tomorrow";
            if (diffDays === -1) return "Due yesterday";
            if (diffDays < -1) return `Overdue by ${Math.abs(diffDays)} days`;

            return `Due ${dueDate}`;
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`/dashboard?session_id=${sessionId}`);
                const data = await response.json();

                greetingText.textContent = getGreeting();

                pendingCount.textContent = data.pending_tasks ?? 0;
                dueTodayCount.textContent = data.due_today ?? 0;
                overdueCount.textContent = data.overdue ?? 0;
                completedCount.textContent = data.completed_tasks ?? 0;
                notesCount.textContent = data.notes_count ?? 0;

                if (data.today_focus) {
                    const dueText = formatDueDate(data.today_focus.due_date);
                    focusText.textContent = dueText
                        ? `Today's focus: ${data.today_focus.task} • ${dueText}`
                        : `Today's focus: ${data.today_focus.task}`;
                } else {
                    focusText.textContent = "No pending tasks. You're clear for now.";
                }

            } catch (error) {
                greetingText.textContent = "Welcome back.";
                focusText.textContent = "Could not load dashboard.";
            }
        }

        function addMessage(text, sender) {
            const row = document.createElement("div");
            row.className = `message-row ${sender}-row`;

            const wrapper = document.createElement("div");

            const bubble = document.createElement("div");
            bubble.className = `message ${sender}`;
            bubble.textContent = text;

            const time = document.createElement("div");
            time.className = "timestamp";
            time.textContent = sender === "user" ? `You • ${getTime()}` : `Jarvis • ${getTime()}`;

            wrapper.appendChild(bubble);
            wrapper.appendChild(time);
            row.appendChild(wrapper);

            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            micBtn.disabled = isLoading;
            typingIndicator.style.display = isLoading ? "flex" : "none";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function quickFill(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        function quickSend(text) {
            messageInput.value = text;
            sendMessage();
        }

        async function toggleVoice() {
            if (isRecording) {
                mediaRecorder.stop();
                return;
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                voiceStatus.textContent = "Microphone recording is not supported in this browser.";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                audioChunks = [];

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: "audio/webm"
                });

                mediaRecorder.onstart = function () {
                    isRecording = true;
                    micBtn.classList.add("recording");
                    micBtn.textContent = "■";
                    voiceStatus.textContent = "Recording... tap again to stop.";
                };

                mediaRecorder.ondataavailable = function (event) {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async function () {
                    isRecording = false;
                    micBtn.classList.remove("recording");
                    micBtn.textContent = "🎤";
                    voiceStatus.textContent = "Transcribing...";

                    stream.getTracks().forEach(track => track.stop());

                    const audioBlob = new Blob(audioChunks, {
                        type: "audio/webm"
                    });

                    await sendVoiceMessage(audioBlob);
                };

                mediaRecorder.start();

            } catch (error) {
                voiceStatus.textContent = "Microphone error: " + error.message;
                isRecording = false;
                micBtn.classList.remove("recording");
                micBtn.textContent = "🎤";
            }
        }

        async function sendVoiceMessage(audioBlob) {
            setLoading(true);

            try {
                const formData = new FormData();
                formData.append("audio", audioBlob, "voice.webm");
                formData.append("session_id", sessionId);

                const response = await fetch("/voice-chat", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.transcript) {
                    addMessage(data.transcript, "user");
                }

                const reply = data.reply || "No response received.";
                addMessage(reply, "jarvis");
                speak(reply);

            } catch (error) {
                addMessage("Could not process voice message. Check the backend logs.", "jarvis");
            } finally {
                setLoading(false);
                loadDashboard();
                voiceStatus.textContent = "";
            }
        }

        function speak(text) {
            if (!("speechSynthesis" in window)) {
                return;
            }

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-US";
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;

            window.speechSynthesis.speak(utterance);
        }

        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message) return;

            addMessage(message, "user");
            messageInput.value = "";
            setLoading(true);
            voiceStatus.textContent = "";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    addMessage(data.detail || "Server error.", "jarvis");
                    return;
                }

                const reply = data.reply || "No response received.";
                addMessage(reply, "jarvis");

            } catch (error) {
                addMessage("Could not contact Jarvis. Check if the backend server is running.", "jarvis");
            } finally {
                setLoading(false);
                loadDashboard();
                messageInput.focus();
            }
        }

        messageInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker
                    .register("/static/service-worker.js")
                    .then(function () {
                        console.log("Service worker registered.");
                    })
                    .catch(function (error) {
                        console.log("Service worker registration failed:", error);
                    });
            });
        }

        loadDashboard();
    </script>
</body>

</html>
