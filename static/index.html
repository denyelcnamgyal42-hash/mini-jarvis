<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mini Jarvis</title>

    <link rel="manifest" href="/static/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Jarvis" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />

    <style>
        * {
            box-sizing: border-box;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.88);
            --panel-soft: rgba(30, 41, 59, 0.9);
            --border: rgba(148, 163, 184, 0.22);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-2: #0ea5e9;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            height: 100vh;
            background:
                radial-gradient(circle at 50% 20%, rgba(56, 189, 248, 0.14), transparent 32%),
                radial-gradient(circle at 20% 90%, rgba(37, 99, 235, 0.18), transparent 30%),
                var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 720px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            padding: 18px 18px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand h1 {
            margin: 0;
            font-size: 19px;
            letter-spacing: -0.03em;
        }

        .brand p {
            margin: 3px 0 0;
            font-size: 12px;
            color: var(--muted);
        }

        .online {
            font-size: 12px;
            color: #86efac;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .online-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 16px;
            min-height: 0;
        }

        .orb-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .orb-button {
            width: 172px;
            height: 172px;
            border-radius: 50%;
            border: 1px solid rgba(56, 189, 248, 0.45);
            background:
                radial-gradient(circle at 35% 30%, #ffffff 0%, #bae6fd 10%, #38bdf8 32%, #0369a1 60%, #020617 100%);
            box-shadow:
                0 0 30px rgba(56, 189, 248, 0.75),
                0 0 90px rgba(56, 189, 248, 0.28),
                inset 0 0 28px rgba(255, 255, 255, 0.2);
            cursor: pointer;
            position: relative;
            color: white;
            font-size: 42px;
            transition: 0.2s ease;
        }

        .orb-button::before,
        .orb-button::after {
            content: "";
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            border: 1px solid rgba(56, 189, 248, 0.22);
            animation: pulseRing 2.8s infinite ease-out;
        }

        .orb-button::after {
            animation-delay: 1.4s;
        }

        .orb-button:hover {
            transform: scale(1.03);
        }

        .orb-button.recording {
            background:
                radial-gradient(circle at 35% 30%, #fee2e2 0%, #f87171 20%, #ef4444 48%, #7f1d1d 100%);
            border-color: rgba(248, 113, 113, 0.8);
            box-shadow:
                0 0 34px rgba(239, 68, 68, 0.8),
                0 0 100px rgba(239, 68, 68, 0.25);
        }

        .orb-button.thinking {
            animation: orbThinking 1.2s infinite ease-in-out;
        }

        @keyframes pulseRing {
            0% {
                transform: scale(0.82);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.25);
                opacity: 0;
            }
        }

        @keyframes orbThinking {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.35);
            }
        }

        .status-text {
            margin-top: 28px;
            font-size: 15px;
            color: var(--muted);
            min-height: 22px;
        }

        .hint {
            margin-top: 5px;
            font-size: 12px;
            color: #64748b;
        }

        .response-panel {
            width: 100%;
            max-height: 42vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            background: var(--panel);
            border-radius: 22px;
            padding: 14px;
            display: none;
            backdrop-filter: blur(16px);
        }

        .response-panel.show {
            display: block;
        }

        .response-title {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .response-text {
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 15px;
            color: #e5e7eb;
        }

        .task-list {
            display: grid;
            gap: 8px;
        }

        .task-card {
            background: rgba(30, 41, 59, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 14px;
            padding: 11px;
        }

        .task-card strong {
            color: #e0f2fe;
            font-size: 14px;
        }

        .task-card p {
            margin: 5px 0 0;
            font-size: 12px;
            color: var(--muted);
        }

        .quick-row {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .quick-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            border: 1px solid var(--border);
            background: rgba(30, 41, 59, 0.82);
            color: #dbeafe;
            padding: 9px 12px;
            border-radius: 999px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }

        .chip:hover {
            border-color: rgba(56, 189, 248, 0.5);
        }

        .bottom {
            padding: 12px;
            border-top: 1px solid rgba(148, 163, 184, 0.12);
            background: rgba(2, 6, 23, 0.85);
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #020617;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 13px;
            background: var(--panel-soft);
            color: white;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: #334155;
        }

        .send-btn {
            background: var(--accent);
            color: #020617;
            font-weight: 800;
        }

        input {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 16px;
            padding: 10px 4px;
        }

        input::placeholder {
            color: #64748b;
        }

        .footer-note {
            margin-top: 6px;
            min-height: 16px;
            font-size: 12px;
            color: var(--muted);
            padding-left: 3px;
        }

        @media (max-width: 720px) {
            .app {
                max-width: none;
            }

            .top-bar {
                padding-top: max(16px, env(safe-area-inset-top));
            }

            .orb-button {
                width: 152px;
                height: 152px;
            }

            .response-panel {
                max-height: 40vh;
            }

            .bottom {
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <header class="top-bar">
            <div class="brand">
                <h1>Mini Jarvis</h1>
                <p>Tap the orb and speak</p>
            </div>

            <div class="online">
                <span class="online-dot"></span>
                Online
            </div>
        </header>

        <section class="main">
            <div class="orb-section">
                <button id="orbBtn" class="orb-button" onclick="toggleVoice()" title="Talk to Jarvis">
                    ◉
                </button>

                <div id="statusText" class="status-text">Ready</div>
                <div class="hint">Tap the orb, speak, then tap again or wait.</div>
            </div>

            <section id="responsePanel" class="response-panel">
                <div id="responseTitle" class="response-title">Jarvis</div>
                <div id="responseContent" class="response-text"></div>
            </section>
        </section>

        <div class="quick-row">
            <button class="chip" onclick="quickSend('what do you remember about me?')">Memory</button>
            <button class="chip" onclick="quickFill('search online for ')">Search</button>
            <button class="chip" onclick="quickFill('debug this error: ')">Debug</button>
            <button class="chip" onclick="quickFill('analyze this file and ')">Analyze file</button>
            <button class="chip" onclick="quickSend('list tasks')">Tasks</button>
            <button class="chip" onclick="quickSend('what should I focus on today?')">Focus</button>
        </div>

        <footer class="bottom">
            <div class="input-wrapper">
                <button id="fileBtn" class="icon-btn" onclick="openFilePicker()" title="Upload file">📎</button>
                <input id="fileInput" type="file" hidden
                    accept=".txt,.md,.py,.js,.html,.css,.json,.csv,.xml,.yaml,.yml,.java,.cpp,.c,.ts,.tsx,.jsx,.vue,.go,.rs,.php,.rb,.cs,.pdf" />

                <input id="messageInput" placeholder="Type only when needed..." autocomplete="off" />
                <button id="sendBtn" class="icon-btn send-btn" onclick="sendMessage()" title="Send">➤</button>
            </div>

            <div id="footerNote" class="footer-note"></div>
        </footer>
    </main>

    <script>
        const orbBtn = document.getElementById("orbBtn");
        const statusText = document.getElementById("statusText");
        const responsePanel = document.getElementById("responsePanel");
        const responseTitle = document.getElementById("responseTitle");
        const responseContent = document.getElementById("responseContent");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const fileBtn = document.getElementById("fileBtn");
        const fileInput = document.getElementById("fileInput");
        const footerNote = document.getElementById("footerNote");

        let sessionId = localStorage.getItem("jarvis_session_id");

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("jarvis_session_id", sessionId);
        }

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingTimer = null;

        const MAX_RECORDING_MS = 10000;

        let availableVoices = [];
        let jarvisVoice = null;

        function loadVoices() {
            if (!("speechSynthesis" in window)) return;

            availableVoices = window.speechSynthesis.getVoices();

            if (!availableVoices.length) return;

            jarvisVoice =
                availableVoices.find(v => v.lang.toLowerCase().startsWith("en-gb") && v.name.toLowerCase().includes("daniel")) ||
                availableVoices.find(v => v.lang.toLowerCase().startsWith("en-gb")) ||
                availableVoices.find(v => v.name.toLowerCase().includes("david")) ||
                availableVoices.find(v => v.name.toLowerCase().includes("mark")) ||
                availableVoices.find(v => v.lang.toLowerCase().startsWith("en")) ||
                availableVoices[0];
        }

        function getSupportedAudioMimeType() {
            const types = [
                "audio/webm;codecs=opus",
                "audio/webm",
                "audio/mp4",
                "audio/mpeg"
            ];

            for (const type of types) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) {
                    return type;
                }
            }

            return "";
        }

        function setStatus(text) {
            statusText.textContent = text;
            footerNote.textContent = text;
        }

        function setThinking(isThinking) {
            sendBtn.disabled = isThinking;
            fileBtn.disabled = isThinking;

            if (isThinking) {
                orbBtn.classList.add("thinking");
                setStatus("Processing...");
            } else {
                orbBtn.classList.remove("thinking");
            }
        }

        function showResponse(text, title = "Jarvis") {
            responsePanel.classList.add("show");
            responseTitle.textContent = title;

            const taskItems = parseTaskList(text);

            if (taskItems.length > 0) {
                responseContent.className = "task-list";
                responseContent.innerHTML = "";

                taskItems.forEach(task => {
                    const card = document.createElement("div");
                    card.className = "task-card";

                    const title = document.createElement("strong");
                    title.textContent = `${task.id}. ${task.name}`;

                    const meta = document.createElement("p");
                    meta.textContent = task.meta || "Task";

                    card.appendChild(title);
                    card.appendChild(meta);
                    responseContent.appendChild(card);
                });

                return;
            }

            responseContent.className = "response-text";
            responseContent.textContent = text;
        }

        function parseTaskList(text) {
            const lines = text.split("\n");
            const tasks = [];

            for (const line of lines) {
                const match = line.match(/^(\d+)\.\s+(.+?)(?:\s+-\s+(.+))?$/);

                if (match) {
                    tasks.push({
                        id: match[1],
                        name: match[2],
                        meta: match[3] || ""
                    });
                }
            }

            return tasks;
        }

        function quickFill(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        function quickSend(text) {
            messageInput.value = text;
            sendMessage();
        }

        function openFilePicker() {
            fileInput.click();
        }

        fileInput.addEventListener("change", async function () {
            const file = fileInput.files[0];
            if (!file) return;

            await uploadFile(file);
            fileInput.value = "";
        });

        async function uploadFile(file) {
            const instruction = messageInput.value.trim();

            showResponse(
                instruction
                    ? `Uploaded file: ${file.name}\nInstruction: ${instruction}`
                    : `Uploaded file: ${file.name}`,
                "You"
            );

            messageInput.value = "";
            setThinking(true);
            setStatus("Analyzing file...");

            try {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("session_id", sessionId);
                formData.append("instruction", instruction);

                const response = await fetch("/upload-file", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                const reply = data.reply || "No file analysis received.";

                showResponse(reply, "Jarvis");
                speak(reply);

            } catch (error) {
                showResponse("Could not analyze file. Check the backend logs.", "Jarvis");
            } finally {
                setThinking(false);
                setStatus("Ready");
                messageInput.focus();
            }
        }

        async function toggleVoice() {
            if (isRecording) {
                stopCurrentRecording();
                return;
            }

            await startRecording();
        }

        async function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus("Microphone recording is not supported in this browser.");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                audioChunks = [];

                const mimeType = getSupportedAudioMimeType();

                mediaRecorder = mimeType
                    ? new MediaRecorder(stream, { mimeType })
                    : new MediaRecorder(stream);

                mediaRecorder.onstart = function () {
                    isRecording = true;
                    orbBtn.classList.add("recording");
                    orbBtn.textContent = "■";
                    setStatus("Listening...");

                    recordingTimer = setTimeout(function () {
                        if (isRecording) {
                            stopCurrentRecording();
                        }
                    }, MAX_RECORDING_MS);
                };

                mediaRecorder.ondataavailable = function (event) {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async function () {
                    isRecording = false;
                    orbBtn.classList.remove("recording");
                    orbBtn.textContent = "◉";
                    clearTimeout(recordingTimer);

                    stream.getTracks().forEach(track => track.stop());

                    const audioBlob = new Blob(audioChunks, {
                        type: mediaRecorder.mimeType || "audio/webm"
                    });

                    if (audioBlob.size < 1000) {
                        setStatus("No clear audio captured.");
                        return;
                    }

                    await sendVoiceMessage(audioBlob);
                };

                playBeep();
                mediaRecorder.start();

            } catch (error) {
                setStatus("Microphone error: " + error.message);
                isRecording = false;
                orbBtn.classList.remove("recording");
                orbBtn.textContent = "◉";
            }
        }

        function stopCurrentRecording() {
            try {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
            } catch (error) {
                console.log(error);
            }
        }

        async function sendVoiceMessage(audioBlob) {
            setThinking(true);
            setStatus("Transcribing...");

            try {
                const formData = new FormData();
                formData.append("audio", audioBlob, "voice.webm");
                formData.append("session_id", sessionId);

                const response = await fetch("/voice-chat", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.transcript) {
                    showResponse(data.transcript, "You");
                }

                const reply = data.reply || "No response received.";

                showResponse(reply, "Jarvis");
                speak(reply);

            } catch (error) {
                showResponse("Could not process voice message. Check the backend logs.", "Jarvis");
            } finally {
                setThinking(false);
                setStatus("Ready");
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message) return;

            showResponse(message, "You");
            messageInput.value = "";
            setThinking(true);

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    showResponse(data.detail || "Server error.", "Jarvis");
                    return;
                }

                const reply = data.reply || "No response received.";

                showResponse(reply, "Jarvis");
                speak(reply);

            } catch (error) {
                showResponse("Could not contact Jarvis. Check if the backend server is running.", "Jarvis");
            } finally {
                setThinking(false);
                setStatus("Ready");
                messageInput.focus();
            }
        }

        function speak(text) {
            if (!("speechSynthesis" in window)) return;

            window.speechSynthesis.cancel();

            playBeep();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-GB";

            // Robotic / Jarvis-inspired feel
            utterance.rate = 0.88;
            utterance.pitch = 0.62;
            utterance.volume = 1;

            if (jarvisVoice) {
                utterance.voice = jarvisVoice;
                utterance.lang = jarvisVoice.lang;
            }

            window.speechSynthesis.speak(utterance);
        }

        function playBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();

                const oscillator = ctx.createOscillator();
                const gain = ctx.createGain();

                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(880, ctx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.12);

                gain.gain.setValueAtTime(0.06, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);

                oscillator.connect(gain);
                gain.connect(ctx.destination);

                oscillator.start();
                oscillator.stop(ctx.currentTime + 0.14);
            } catch (error) {
                // Ignore audio context errors
            }
        }

        messageInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker
                    .register("/static/service-worker.js")
                    .then(function () {
                        console.log("Service worker registered.");
                    })
                    .catch(function (error) {
                        console.log("Service worker registration failed:", error);
                    });
            });
        }

        loadVoices();

        if ("speechSynthesis" in window) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
    </script>
</body>

</html>
