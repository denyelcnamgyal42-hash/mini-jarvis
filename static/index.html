<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mini Jarvis</title>

    <link rel="manifest" href="/static/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Jarvis" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />

    <style>
        * {
            box-sizing: border-box;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        :root {
            --bg: #0f172a;
            --panel-soft: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --user: #2563eb;
            --bot: #1e293b;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            width: 100%;
            max-width: 720px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: #020617;
        }

        .header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.96);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #e0f2fe, #38bdf8, #0369a1);
            box-shadow: 0 0 18px rgba(56, 189, 248, 0.45);
            flex-shrink: 0;
        }

        .brand h1 {
            margin: 0;
            font-size: 18px;
        }

        .brand p {
            margin: 2px 0 0;
            font-size: 12px;
            color: var(--muted);
        }

        .status {
            font-size: 12px;
            color: #86efac;
            white-space: nowrap;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 18px 14px;
        }

        .message-row {
            display: flex;
            margin-bottom: 14px;
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        .message-row.bot-row {
            justify-content: flex-start;
        }

        .message {
            max-width: 82%;
            padding: 12px 14px;
            border-radius: 18px;
            line-height: 1.45;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            background: var(--user);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.bot {
            background: var(--bot);
            color: #e5e7eb;
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-bottom-left-radius: 6px;
        }

        .time {
            margin-top: 4px;
            font-size: 11px;
            color: var(--muted);
        }

        .user-row .time {
            text-align: right;
        }

        .typing {
            display: none;
            padding: 0 16px 10px;
            color: var(--muted);
            font-size: 13px;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            background: #020617;
            scrollbar-width: none;
        }

        .quick-actions::-webkit-scrollbar {
            display: none;
        }

        .chip {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--panel-soft);
            color: #dbeafe;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }

        .chip.active {
            border-color: var(--success);
            color: #bbf7d0;
            box-shadow: 0 0 14px rgba(34, 197, 94, 0.2);
        }

        .input-area {
            padding: 12px;
            border-top: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.98);
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #020617;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            border: none;
            background: var(--panel-soft);
            color: white;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: #334155;
        }

        .send-btn {
            background: var(--accent);
            color: #020617;
            font-weight: bold;
        }

        .send-btn:hover {
            background: #7dd3fc;
        }

        .mic-btn.recording {
            background: var(--danger);
            color: white;
        }

        .icon-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        input {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 10px 4px;
        }

        input::placeholder {
            color: #64748b;
        }

        .voice-status {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            min-height: 16px;
        }

        @media (max-width: 720px) {
            .app {
                max-width: none;
            }

            .message {
                max-width: 88%;
            }

            .header {
                padding-top: max(14px, env(safe-area-inset-top));
            }

            .input-area {
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <header class="header">
            <div class="brand">
                <div class="avatar"></div>
                <div>
                    <h1>Mini Jarvis</h1>
                    <p>AI assistant</p>
                </div>
            </div>

            <div class="status">Online</div>
        </header>

        <section id="chatBox" class="chat">
            <div class="message-row bot-row">
                <div>
                    <div class="message bot">
                        Hello. I am Mini Jarvis. You can type, upload files, use the mic, or start a Voice Session.
                    </div>
                    <div class="time">Jarvis</div>
                </div>
            </div>
        </section>

        <div id="typingIndicator" class="typing">
            Jarvis is thinking...
        </div>

        <div class="quick-actions">
            <button id="voiceSessionBtn" class="chip" onclick="toggleVoiceSession()">Voice Session</button>
            <button class="chip" onclick="quickSend('what do you remember about me?')">Memory</button>
            <button class="chip" onclick="quickFill('search online for ')">Search</button>
            <button class="chip" onclick="quickFill('debug this error: ')">Debug</button>
            <button class="chip" onclick="quickFill('analyze this file and ')">Analyze file</button>
            <button class="chip" onclick="quickSend('what should I focus on today?')">Focus</button>
            <button class="chip" onclick="quickSend('list tasks')">Tasks</button>
        </div>

        <footer class="input-area">
            <div class="input-wrapper">
                <button id="micBtn" class="icon-btn mic-btn" onclick="toggleVoice()" title="Voice">🎤</button>

                <button id="fileBtn" class="icon-btn file-btn" onclick="openFilePicker()"
                    title="Upload file">📎</button>
                <input id="fileInput" type="file" hidden
                    accept=".txt,.md,.py,.js,.html,.css,.json,.csv,.xml,.yaml,.yml,.java,.cpp,.c,.ts,.tsx,.jsx,.vue,.go,.rs,.php,.rb,.cs,.pdf" />

                <input id="messageInput" placeholder="Message Jarvis..." autocomplete="off" />
                <button id="sendBtn" class="icon-btn send-btn" onclick="sendMessage()" title="Send">➤</button>
            </div>

            <div id="voiceStatus" class="voice-status"></div>
        </footer>
    </main>

    <script>
        const chatBox = document.getElementById("chatBox");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const micBtn = document.getElementById("micBtn");
        const fileBtn = document.getElementById("fileBtn");
        const fileInput = document.getElementById("fileInput");
        const typingIndicator = document.getElementById("typingIndicator");
        const voiceStatus = document.getElementById("voiceStatus");
        const voiceSessionBtn = document.getElementById("voiceSessionBtn");

        let sessionId = localStorage.getItem("jarvis_session_id");

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("jarvis_session_id", sessionId);
        }

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let currentRecordingFromSession = false;

        let voiceSessionEnabled = false;
        let sessionRestartTimer = null;
        let recordingTimer = null;

        const MAX_SESSION_RECORDING_MS = 10000;

        let availableVoices = [];
        let roboticVoice = null;

        function getTime() {
            return new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function loadVoices() {
            if (!("speechSynthesis" in window)) return;

            availableVoices = window.speechSynthesis.getVoices();

            if (!availableVoices.length) return;

            roboticVoice =
                availableVoices.find(v => v.lang.toLowerCase().startsWith("en") && v.name.toLowerCase().includes("david")) ||
                availableVoices.find(v => v.lang.toLowerCase().startsWith("en") && v.name.toLowerCase().includes("mark")) ||
                availableVoices.find(v => v.lang.toLowerCase().startsWith("en") && v.name.toLowerCase().includes("daniel")) ||
                availableVoices.find(v => v.lang.toLowerCase().startsWith("en") && v.name.toLowerCase().includes("male")) ||
                availableVoices.find(v => v.lang.toLowerCase().startsWith("en")) ||
                availableVoices[0];
        }

        function getSupportedAudioMimeType() {
            const types = [
                "audio/webm;codecs=opus",
                "audio/webm",
                "audio/mp4",
                "audio/mpeg"
            ];

            for (const type of types) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) {
                    return type;
                }
            }

            return "";
        }

        function addMessage(text, sender) {
            const row = document.createElement("div");
            row.className = `message-row ${sender === "user" ? "user-row" : "bot-row"}`;

            const wrapper = document.createElement("div");

            const bubble = document.createElement("div");
            bubble.className = `message ${sender === "user" ? "user" : "bot"}`;
            bubble.textContent = text;

            const time = document.createElement("div");
            time.className = "time";
            time.textContent = sender === "user" ? `You • ${getTime()}` : `Jarvis • ${getTime()}`;

            wrapper.appendChild(bubble);
            wrapper.appendChild(time);
            row.appendChild(wrapper);

            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            micBtn.disabled = isLoading;
            fileBtn.disabled = isLoading;
            typingIndicator.style.display = isLoading ? "block" : "none";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function quickFill(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        function quickSend(text) {
            messageInput.value = text;
            sendMessage();
        }

        function openFilePicker() {
            fileInput.click();
        }

        fileInput.addEventListener("change", async function () {
            const file = fileInput.files[0];
            if (!file) return;

            await uploadFile(file);
            fileInput.value = "";
        });

        async function uploadFile(file) {
            const instruction = messageInput.value.trim();

            addMessage(
                instruction
                    ? `Uploaded file: ${file.name}\nInstruction: ${instruction}`
                    : `Uploaded file: ${file.name}`,
                "user"
            );

            messageInput.value = "";
            setLoading(true);
            voiceStatus.textContent = "Analyzing file...";

            try {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("session_id", sessionId);
                formData.append("instruction", instruction);

                const response = await fetch("/upload-file", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                addMessage(data.reply || "No file analysis received.", "bot");

            } catch (error) {
                addMessage("Could not analyze file. Check the backend logs.", "bot");
            } finally {
                setLoading(false);
                voiceStatus.textContent = "";
                messageInput.focus();
            }
        }

        async function toggleVoice() {
            if (isRecording) {
                stopCurrentRecording();
                return;
            }

            await startCommandRecording(false);
        }

        async function toggleVoiceSession() {
            if (voiceSessionEnabled) {
                stopVoiceSession();
                return;
            }

            startVoiceSession();
        }

        async function startVoiceSession() {
            voiceSessionEnabled = true;
            voiceSessionBtn.classList.add("active");
            voiceSessionBtn.textContent = "Voice Session: On";
            voiceStatus.textContent = "Voice Session starting...";

            await speakAsync("Voice session started. I am listening.");

            if (voiceSessionEnabled) {
                await startCommandRecording(true);
            }
        }

        function stopVoiceSession() {
            voiceSessionEnabled = false;
            voiceSessionBtn.classList.remove("active");
            voiceSessionBtn.textContent = "Voice Session";
            voiceStatus.textContent = "Voice Session stopped.";

            clearTimeout(sessionRestartTimer);
            clearTimeout(recordingTimer);

            if (isRecording) {
                stopCurrentRecording();
            }

            setTimeout(function () {
                if (!voiceSessionEnabled) {
                    voiceStatus.textContent = "";
                }
            }, 1500);
        }

        async function startCommandRecording(fromSession = false) {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                voiceStatus.textContent = "Microphone recording is not supported in this browser.";
                return;
            }

            if (isRecording) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                audioChunks = [];
                currentRecordingFromSession = fromSession;

                const mimeType = getSupportedAudioMimeType();

                mediaRecorder = mimeType
                    ? new MediaRecorder(stream, { mimeType })
                    : new MediaRecorder(stream);

                mediaRecorder.onstart = function () {
                    isRecording = true;
                    micBtn.classList.add("recording");
                    micBtn.textContent = "■";

                    if (fromSession) {
                        voiceStatus.textContent = "Listening... speak now.";
                        recordingTimer = setTimeout(function () {
                            if (isRecording) {
                                stopCurrentRecording();
                            }
                        }, MAX_SESSION_RECORDING_MS);
                    } else {
                        voiceStatus.textContent = "Recording... tap stop when finished.";
                    }
                };

                mediaRecorder.ondataavailable = function (event) {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async function () {
                    isRecording = false;
                    micBtn.classList.remove("recording");
                    micBtn.textContent = "🎤";

                    clearTimeout(recordingTimer);

                    stream.getTracks().forEach(track => track.stop());

                    const audioBlob = new Blob(audioChunks, {
                        type: mediaRecorder.mimeType || "audio/webm"
                    });

                    if (audioBlob.size < 1000) {
                        voiceStatus.textContent = "No clear audio captured.";

                        if (voiceSessionEnabled) {
                            restartVoiceSessionListening();
                        }

                        return;
                    }

                    voiceStatus.textContent = "Transcribing...";
                    await sendVoiceMessage(audioBlob, currentRecordingFromSession);
                };

                mediaRecorder.start();

            } catch (error) {
                voiceStatus.textContent = "Microphone error: " + error.message;
                isRecording = false;
                micBtn.classList.remove("recording");
                micBtn.textContent = "🎤";

                if (voiceSessionEnabled) {
                    restartVoiceSessionListening();
                }
            }
        }

        function stopCurrentRecording() {
            try {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
            } catch (error) {
                console.log(error);
            }
        }

        async function sendVoiceMessage(audioBlob, fromSession = false) {
            setLoading(true);

            try {
                const formData = new FormData();
                formData.append("audio", audioBlob, "voice.webm");
                formData.append("session_id", sessionId);

                const response = await fetch("/voice-chat", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.transcript) {
                    addMessage(data.transcript, "user");
                }

                const reply = data.reply || "No response received.";
                addMessage(reply, "bot");

                if (fromSession) {
                    await speakAsync(reply);
                } else {
                    speak(reply);
                }

            } catch (error) {
                addMessage("Could not process voice message. Check the backend logs.", "bot");

                if (fromSession) {
                    await speakAsync("I could not process that voice message.");
                }

            } finally {
                setLoading(false);

                if (fromSession && voiceSessionEnabled) {
                    restartVoiceSessionListening();
                } else {
                    voiceStatus.textContent = "";
                }
            }
        }

        function restartVoiceSessionListening() {
            clearTimeout(sessionRestartTimer);

            voiceStatus.textContent = "Voice Session active. Listening again shortly...";

            sessionRestartTimer = setTimeout(async function () {
                if (voiceSessionEnabled && !isRecording) {
                    await startCommandRecording(true);
                }
            }, 900);
        }

        function speak(text) {
            if (!("speechSynthesis" in window)) return;

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-US";

            utterance.rate = 0.92;
            utterance.pitch = 0.72;
            utterance.volume = 1;

            if (roboticVoice) {
                utterance.voice = roboticVoice;
                utterance.lang = roboticVoice.lang;
            }

            window.speechSynthesis.speak(utterance);
        }

        function speakAsync(text) {
            return new Promise(function (resolve) {
                if (!("speechSynthesis" in window)) {
                    resolve();
                    return;
                }

                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = "en-US";

                utterance.rate = 0.92;
                utterance.pitch = 0.72;
                utterance.volume = 1;

                if (roboticVoice) {
                    utterance.voice = roboticVoice;
                    utterance.lang = roboticVoice.lang;
                }

                utterance.onend = function () {
                    resolve();
                };

                utterance.onerror = function () {
                    resolve();
                };

                window.speechSynthesis.speak(utterance);
            });
        }

        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message) return;

            addMessage(message, "user");
            messageInput.value = "";
            setLoading(true);
            voiceStatus.textContent = "";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    addMessage(data.detail || "Server error.", "bot");
                    return;
                }

                addMessage(data.reply || "No response received.", "bot");

            } catch (error) {
                addMessage("Could not contact Jarvis. Check if the backend server is running.", "bot");
            } finally {
                setLoading(false);
                messageInput.focus();
            }
        }

        messageInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker
                    .register("/static/service-worker.js")
                    .then(function () {
                        console.log("Service worker registered.");
                    })
                    .catch(function (error) {
                        console.log("Service worker registration failed:", error);
                    });
            });
        }

        loadVoices();

        if ("speechSynthesis" in window) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
    </script>
</body>

</html>
